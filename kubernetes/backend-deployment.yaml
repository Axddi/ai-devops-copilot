apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-api
  namespace: ai-devops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-devops-api

  template:
    metadata:
      labels:
        app: ai-devops-api

    spec:
      containers:
        - name: api

          image: 678882708618.dkr.ecr.ap-south-1.amazonaws.com/ai-devops-api:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-devops-secrets
                  key: GEMINI_API_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"